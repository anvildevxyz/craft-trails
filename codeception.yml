actor: Tester
paths:
  tests: tests
  output: tests/_output
  data: tests/_data
  support: tests/_support
  envs: tests/_envs
bootstrap: _bootstrap.php
settings:
  params:
    - tests/.env
modules:
  config:
    \craft\test\Craft:
      configFile: 'tests/_craft/config/test.php'
      entryUrl: 'https://craft-plugin-dev.ddev.site/index.php'
      projectConfig: {}
      migrations: []
      plugins:
        - handle: trails
          class: anvildev\trails\Trails
      cleanup: true
      transaction: true
      dbSetup:
        clean: true
        setupCraft: true
